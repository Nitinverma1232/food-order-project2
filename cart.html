<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<link rel="stylesheet" href="style.css">

<style>

.cart-container{
width:90%;
margin:40px auto;
}

.cart-item{
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,.15);
}

.cart-item img{
width:120px;
height:90px;
object-fit:cover;
border-radius:10px;
}

.cart-info{
flex:1;
margin-left:20px;
}

.cart-info h3{
margin-bottom:10px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

.total{
margin-top:30px;
text-align:right;
font-size:28px;
font-weight:bold;
}

.order-btn{
margin-top:20px;
float:right;
padding:15px 25px;
background:#ff5722;
color:white;
border:none;
font-size:18px;
cursor:pointer;
border-radius:8px;
}

</style>

</head>

<body>

<nav>

<div class="logo">
🍔 Foodie
</div>

<button onclick="location.href='index.html'">
🏠 Home
</button>

</nav>

<div class="cart-container">

<h1>🛒 My Cart</h1>

<div id="cart-items">

</div>

<div class="total">

Total = ₹<span id="total-price">0</span>

</div>

<button class="order-btn" onclick="placeOrder()">

Place Order

</button>

</div>

<script src="cart.js"></script>

</body>
</html>
